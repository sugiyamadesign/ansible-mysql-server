---
# ============================================================
# 1. MySQL および必要なライブラリのインストール
# ============================================================
- name: MySQL公式リポジトリ設定を削除する
  file:
    path: /etc/yum.repos.d/mysql-community.repo
    state: absent

- name: DNFのキャッシュを更新する
  dnf:
    update_cache: yes

- name: MySQLサーバーとAnsible用Pythonライブラリをインストールする (AlmaLinux 10向け)
  dnf:
    name:
      - mysql-community-server
      - python3-PyMySQL
    state: present
  when: ansible_distribution_major_version | int == 10

- name: MySQLサーバーとAnsible用Pythonライブラリをインストールする (AlmaLinux 8/9向け)
  dnf:
    name:
      - mysql-server
      - python3-PyMySQL
    state: present
  when: ansible_distribution_major_version | int <= 9


# ============================================================
# 2. 全体設定ファイル (my.cnf) の適用
# ============================================================
- name: サーバースペック(メモリ)に最適化された全体設定ファイルを適用する
  template:
    src: my.cnf.j2
    dest: /etc/my.cnf.d/mysql-server.cnf
  notify: restart mysql

# ============================================================
# 3. サービスの起動（初期設定のため）
# ============================================================
- name: MySQLサービスを起動し、次回OS起動時にも自動起動するように有効化する
  systemd:
    name: mysqld
    state: started
    enabled: yes

- name: ここまでの設定変更に伴う 再起動ハンドラー を今すぐ強制的に実行する
  meta: flush_handlers

- name: 現在のrootパスワードでログインできるか確認する
  command: >
    mysql
    -uroot
    -p'{{ mysql_root_password }}'
    -e "SELECT 1;"
  register: mysql_root_login_check
  changed_when: false
  failed_when: false
  no_log: true

- name: MySQL rootの一時パスワードを取得する
  shell: "grep 'temporary password' /var/log/mysqld.log | awk '{print $NF}' | tail -n 1"
  register: mysql_temp_password
  changed_when: false
  failed_when: false
  when: mysql_root_login_check.rc != 0

- name: MySQLのrootパスワードを初期パスワードから変更する
  command: >
    mysql --connect-expired-password
    -uroot
    -p'{{ mysql_temp_password.stdout }}'
    -e "ALTER USER 'root'@'localhost' IDENTIFIED BY '{{ mysql_root_password }}';"
  when:
    - mysql_root_login_check.rc != 0
    - mysql_temp_password.stdout is defined
    - mysql_temp_password.stdout != ""
  no_log: true

# ============================================================
# 4. MySQL初期セキュリティ設定とデータベース構築
# ============================================================


- name: アプリケーション用のデータベースを作成する
  community.mysql.mysql_db:
    name: "{{ mysql_app_database }}"
    state: present
    login_user: root
    login_password: "{{ mysql_root_password }}"
    login_unix_socket: /var/lib/mysql/mysql.sock

- name: アプリケーション用ユーザーを外部接続用に作成する
  community.mysql.mysql_query:
    login_user: root
    login_password: "{{ mysql_root_password }}"
    login_unix_socket: /var/lib/mysql/mysql.sock
    query: >
      CREATE USER IF NOT EXISTS '{{ mysql_app_user }}'@'%'
      IDENTIFIED BY '{{ mysql_app_password }}';

- name: アプリケーション用ユーザーにDB権限を付与する
  community.mysql.mysql_query:
    login_user: root
    login_password: "{{ mysql_root_password }}"
    login_unix_socket: /var/lib/mysql/mysql.sock
    query: >
      GRANT ALL PRIVILEGES ON {{ mysql_app_database }}.* TO '{{ mysql_app_user }}'@'%';

- name: メンテナンス用ユーザーを外部接続用に作成する
  community.mysql.mysql_query:
    login_user: root
    login_password: "{{ mysql_root_password }}"
    login_unix_socket: /var/lib/mysql/mysql.sock
    query: >
      CREATE USER IF NOT EXISTS '{{ mysql_maintainer_user }}'@'%'
      IDENTIFIED BY '{{ mysql_maintainer_password }}';

- name: メンテナンス用ユーザーにDB権限を付与する
  community.mysql.mysql_query:
    login_user: root
    login_password: "{{ mysql_root_password }}"
    login_unix_socket: /var/lib/mysql/mysql.sock
    query: >
      GRANT ALL PRIVILEGES ON {{ mysql_app_database }}.* TO '{{ mysql_maintainer_user }}'@'%';